.spec-card { border: 1px solid var(--pale-dim); border-radius: 6px; background: rgba(168,206,206,0.03); padding: 1.6rem 1.7rem; position: sticky; top: 100px; }

.spec-links { margin-top: 1.4rem; display: flex; flex-direction: column; gap: 0.6rem; }

.spec-links a:hover { background: rgba(107,191,190,0.08); border-color: var(--aqua); }
.p-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
.p-gallery .imgframe, .p-gallery .photo-ph { aspect-ratio: 4/3; border-radius: 5px; overflow: hidden; cursor: pointer; }
.p-gallery .imgframe img { transition: transform 0.5s var(--ease-out); }
.p-gallery .imgframe:hover img { transform: scale(1.05); }
.p-pun { font-family: var(--font-display); font-style: italic; font-size: 1.4rem; color: var(--amber); opacity: 0.8; margin-top: 3rem; }
.p-foot-nav { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
@media (max-width: 880px) { .p-body { grid-template-columns: 1fr; } .spec-card { position: static; } .p-gallery { grid-template-columns: repeat(2,1fr); } }
